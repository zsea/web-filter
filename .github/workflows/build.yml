name: Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build dist
        run: npm run build

      - name: Verify dist output
        run: test -f dist/web-filter.js

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-web-filter
          path: dist/web-filter.js
