name: Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build dist
        run: npm run build

      - name: Verify dist output
        run: test -f dist/web-filter.js

      - name: Commit and push dist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- dist/web-filter.js; then
            echo "No dist changes to commit"
            exit 0
          fi
          git add dist/web-filter.js
          git commit -m "chore: update dist [skip ci]"
          git push origin HEAD:${{ github.ref_name }}

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-web-filter
          path: dist/web-filter.js
