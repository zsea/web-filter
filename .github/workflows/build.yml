name: Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build dist
        run: npm run build

      - name: Verify dist output
        run: test -f dist/web-filter.js

      - name: Prepare release asset
        run: |
          cp dist/web-filter.js dist/web-filter-mini.js

      - name: Publish to GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: auto-build
          name: Auto Build
          body: Auto-generated build from ${{ github.sha }}
          artifacts: dist/web-filter-mini.js
          allowUpdates: true
          replacesArtifacts: true
