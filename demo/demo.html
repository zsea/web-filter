<!doctype html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Web Filter Demo</title>
	<style>
		body {
			margin: 0;
			min-height: 100vh;
			display: grid;
			place-items: center;
			font-family: "Segoe UI", sans-serif;
			background: #f6f7fb;
			color: #1f2937;
		}

		.card {
			width: min(90vw, 520px);
			padding: 24px;
			border-radius: 12px;
			background: #ffffff;
			box-shadow: 0 8px 20px rgba(15, 23, 42, 0.08);
		}

		h1 {
			margin: 0 0 12px;
			font-size: 24px;
		}

		p {
			margin: 0 0 16px;
			line-height: 1.6;
		}

		button {
			border: 0;
			padding: 10px 16px;
			border-radius: 8px;
			background: #2563eb;
			color: #fff;
			cursor: pointer;
		}

		button:hover {
			background: #1d4ed8;
		}
	</style>
    <script type="text/javascript" src="../src/web-filter.js"></script>
    <script type="text/javascript" src="./demo.js"></script>
    <script type="text/javascript">
        // 在页面加载完成后执行过滤器
        document.addEventListener("DOMContentLoaded", function() {
            document.getElementById("btnRefresh").addEventListener("click", function() {
                // 这里可以添加刷新页面的逻辑，例如重新加载数据或更新组件
                //alert("刷新按钮被点击了！");
                window.location.reload(); // 重新加载页面
            });
        });
    </script>
</head>
<body>
	<main class="card">
		<h1>简单页面示例</h1>
		<p>这是一个用于演示的 HTML 页面。你可以在这里继续添加组件或脚本。</p>
		<button id="btnRefresh" type="button">刷新</button>
	</main>
</body>
</html>
